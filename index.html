<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuncio El Patio - Administrable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @keyframes horizontal-drive {
            0%, 100% { transform: translateX(-2px) skewX(0deg); }
            50% { transform: translateX(6px) skewX(-15deg); }
        }
        .animate-drive { animation: horizontal-drive 0.4s ease-in-out infinite; }
        @keyframes speed-line {
            0% { transform: translateX(10px); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateX(-35px); opacity: 0; }
        }
        .animate-speed-line-1 { animation: speed-line 0.35s linear infinite; }
        .animate-speed-line-2 { animation: speed-line 0.45s linear infinite 0.1s; }
        .animate-speed-line-3 { animation: speed-line 0.3s linear infinite 0.2s; }
        @keyframes float-wa {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float-wa { animation: float-wa 3s ease-in-out infinite; }
        
        /* Ocultar barra de scroll en modal pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen bg-stone-950 flex flex-col items-center p-4 sm:p-8 font-sans pb-24">

    <!-- CONTENEDOR PRINCIPAL DEL MENÚ (Se inyecta dinámicamente) -->

        <!-- El contenido se renderiza aquí vía JavaScript -->
    </div>

    <!-- BOTÓN FLOTANTE WHATSAPP GLOBAL -->
    <button onclick="enviarPedidoGeneral()" class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 bg-[#25D366] hover:bg-green-600 text-white p-4 rounded-full shadow-[0_4px_20px_0_rgba(37,211,102,0.6)] transform transition-all hover:scale-110 z-40 animate-float-wa flex items-center justify-center group">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
        </svg>
    </button>

    <!-- BOTÓN DE ACCESO ADMINISTRADOR (Oculto/Sutil en esquina inferior izquierda) -->
    <button onclick="verificarAdmin()" class="fixed bottom-6 left-6 text-stone-600 hover:text-white opacity-30 hover:opacity-100 transition-all z-40 p-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
    </button>

    <!-- MODAL DE ADMINISTRACIÓN -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-stone-900 border border-stone-700 w-full max-w-4xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
            
            <div class="p-6 border-b border-stone-800 flex justify-between items-center bg-stone-950">
                <h2 class="text-white font-black text-2xl flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-500"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M12 2v2"/><path d="M12 22v-2"/><path d="m17 20.66-1-1.73"/><path d="M11 10.27 7 3.34"/><path d="m20.66 17-1.73-1"/><path d="m3.34 7 1.73 1"/><path d="M14 12h8"/><path d="M2 12h2"/><path d="m20.66 7-1.73 1"/><path d="m3.34 17 1.73-1"/><path d="m17 3.34-1 1.73"/><path d="m11 13.73-4 6.93"/></svg>
                    Panel de Administración
                </h2>
                <button onclick="cerrarAdmin()" class="text-stone-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>

            <div class="p-6 overflow-y-auto no-scrollbar flex-grow space-y-8" id="admin-form-container">
                <!-- Configuración General -->
                <div class="bg-stone-950 p-5 rounded-xl border border-stone-800">
                    <h3 class="text-orange-500 font-bold mb-4 uppercase tracking-widest text-sm">Configuración General</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-stone-400 text-xs font-bold mb-1">Teléfono 1 (Con código de país)</label>
                            <input type="text" id="edit-phone-1" class="w-full bg-stone-800 text-white border border-stone-700 rounded-lg p-3 focus:outline-none focus:border-orange-500">
                        </div>
                        <div>
                            <label class="block text-stone-400 text-xs font-bold mb-1">Teléfono 2 (Con código de país)</label>
                            <input type="text" id="edit-phone-2" class="w-full bg-stone-800 text-white border border-stone-700 rounded-lg p-3 focus:outline-none focus:border-orange-500">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-stone-400 text-xs font-bold mb-1">Dirección del Local</label>
                            <input type="text" id="edit-address" class="w-full bg-stone-800 text-white border border-stone-700 rounded-lg p-3 focus:outline-none focus:border-orange-500">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-stone-400 text-xs font-bold mb-1">Mensaje Base WhatsApp</label>
                            <input type="text" id="edit-wa-msg" class="w-full bg-stone-800 text-white border border-stone-700 rounded-lg p-3 focus:outline-none focus:border-orange-500">
                        </div>
                    </div>
                </div>

                <!-- Lista de Productos -->
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-orange-500 font-bold uppercase tracking-widest text-sm">Productos</h3>
                        <button onclick="agregarProductoVacio()" class="bg-stone-800 hover:bg-stone-700 text-white text-sm py-2 px-4 rounded-lg flex items-center gap-2 border border-stone-700 transition-colors">

                    </div>

                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-stone-800 bg-stone-950 flex justify-end gap-4">
                <button onclick="cerrarAdmin()" class="px-6 py-3 rounded-xl text-white font-bold hover:bg-stone-800 transition-colors">Cancelar</button>
                <button onclick="guardarCambios()" class="px-6 py-3 rounded-xl bg-orange-600 hover:bg-orange-500 text-white font-black shadow-lg transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Guardar Cambios
                </button>
            </div>
        </div>
    </div>

    <!-- SCRIPT PRINCIPAL DE LÓGICA Y RENDERIZADO -->
    <script>
        // DATOS POR DEFECTO (Si no hay nada guardado)
        const defaultData = {
            phones: ['50588946272', '50585666459'],
            address: 'Ubicados frente alcohólicos anónimos cofradía',
            waMessage: '¡Hola El Patio! Me gustaría hacer un pedido para delivery. 🛵🍗',
            products: [
                {
                    id: 1,
                    name: "COMBO PERSONAL",
                    desc: "6 piezas de pollo, 3 salsas, más una orden de papas.",
                    price: "200",
                    img: "https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?q=80&w=800&auto=format&fit=crop",
                    popular: false
                },
                {
                    id: 2,
                    name: "COMBO PARA DOS",
                    desc: "10 piezas de pollo, 4 salsas, más una orden de papas.",
                    price: "300",
                    img: "https://images.unsplash.com/photo-1562967914-608f82629710?q=80&w=800&auto=format&fit=crop",
                    popular: true
                },
                {
                    id: 3,
                    name: "COMBO FAMILIAR",
                    desc: "24 piezas de pollo, mas 8 salsas y 4 órdenes de papas.",
                    price: "720",
                    img: "https://www.clarin.com/img/2025/03/24/Ajub_a4rW_1256x620__2.jpg#1742839157762",
                    popular: false
                },
                {
                    id: 4,
                    name: "PAPAS EXTRAS",
                    desc: "La porción perfecta para acompañar tu pollo.",
                    price: "50",
                    img: "https://images.unsplash.com/photo-1541592106381-b31e9677c0e5?q=80&w=800&auto=format&fit=crop",
                    popular: false
                }
            ]
        };

        // Estado actual de la App (Carga desde LocalStorage o usa Default)
        let appData = JSON.parse(localStorage.getItem('elPatioData')) || defaultData;
        let adminTempProducts = []; // Para manejar la edición temporal en el modal

        // --- RENDERIZADO DEL MENÚ PÚBLICO ---
        function renderizarMenu() {
            const container = document.getElementById('app-container');
            
            // Generar HTML de Productos
            let productosHTML = appData.products.map(p => `
                <div class="flex flex-col xl:flex-row bg-stone-800 rounded-3xl overflow-hidden shadow-2xl border ${p.popular ? 'border-2 border-orange-500 ring-4 ring-orange-500/20' : 'border border-stone-700'} transition-all duration-300 hover:-translate-y-2 relative">
                    ${p.popular ? `
                    <div class="absolute top-4 left-4 xl:top-4 xl:left-4 bg-yellow-400 text-black text-xs font-black px-3 py-1.5 rounded-full flex items-center gap-1 shadow-lg z-20 animate-pulse">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        ¡MÁS PEDIDO!
                    </div>` : ''}
                    
                    <div class="w-full xl:w-2/5 h-56 xl:h-auto relative overflow-hidden group">
                        <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover transform transition-transform duration-700 group-hover:scale-110"/>
                        <div class="absolute inset-0 bg-gradient-to-t xl:bg-gradient-to-r from-stone-800 via-transparent to-transparent"></div>
                    </div>
                    
                    <div class="w-full xl:w-3/5 p-6 sm:p-8 flex flex-col justify-between items-center xl:items-start text-center xl:text-left relative z-10 bg-stone-800">
                        <div>
                            <h3 class="text-white font-black text-2xl sm:text-3xl mb-2 drop-shadow-md">${p.name}</h3>
                            <p class="text-stone-300 text-sm sm:text-base leading-relaxed mb-6">${p.desc}</p>
                        </div>
                        
                        <button onclick="enviarPedidoProducto('${p.name}', '${p.price}')" class="group relative w-full bg-orange-600 hover:bg-[#25D366] text-white font-black text-xl sm:text-2xl py-3 px-6 rounded-2xl shadow-lg transform transition-all duration-300 hover:scale-105 flex items-center justify-center gap-3 overflow-hidden mt-auto">
                            <span class="relative z-10 flex items-center gap-2">
                                <span>C$ ${p.price}</span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="w-0 opacity-0 group-hover:w-6 group-hover:opacity-100 transition-all duration-300">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
                                </svg>
                            </span>
                            <div class="absolute inset-0 bg-white/20 transform -skew-x-12 -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
                        </button>
                    </div>
                </div>
            `).join('');

            // Construir Estructura Principal HTML
            container.innerHTML = `
                <!-- Logo -->
                <div class="absolute top-0 left-0 bg-white z-20 rounded-br-[2rem] shadow-xl p-4 sm:p-6 border-b-4 border-r-4 border-orange-500 flex flex-col items-center justify-center transform transition-transform hover:scale-105">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-black mb-1"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg>
                    <h1 class="text-black font-black text-xl sm:text-2xl tracking-tighter leading-none text-center">EL PATIO</h1>
                    <p class="text-orange-600 font-bold text-xs sm:text-sm italic transform -rotate-2 mt-1">De la abuela</p>
                </div>

                <!-- Banner Header -->
                <div class="relative pt-28 pb-12 px-6 sm:px-12 bg-gradient-to-b from-stone-800 to-stone-900 overflow-hidden text-center sm:text-right">
                    <div class="absolute top-[-50%] right-[-5%] opacity-10 pointer-events-none text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
                    </div>
                    <h2 class="text-orange-500 font-black text-4xl sm:text-6xl tracking-widest uppercase drop-shadow-lg inline-block relative z-10 mt-4 sm:mt-0">
                        Nuestros Combos
                        <div class="h-2 bg-orange-500 w-1/2 mx-auto sm:ml-auto sm:mr-0 mt-2 rounded-full"></div>
                    </h2>
                </div>

                <!-- Grid Productos -->
                <div class="px-6 sm:px-10 py-8 grid grid-cols-1 lg:grid-cols-2 gap-8 relative z-10 flex-grow">
                    ${productosHTML}
                </div>

                <!-- Footer (Motos y Teléfonos) -->
                <div class="mt-auto">
                    <div class="bg-orange-600 px-6 sm:px-12 py-8 sm:py-10 flex flex-col md:flex-row items-center justify-between gap-8 relative overflow-hidden">
                        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, black 1px, transparent 0); background-size: 20px 20px;"></div>
                        
                        <div class="flex flex-col sm:flex-row items-center gap-6 relative z-10">
                            <div class="bg-white text-orange-600 w-20 sm:w-24 h-20 sm:h-24 rounded-full shadow-2xl relative flex items-center justify-center overflow-hidden border-4 border-orange-400 shrink-0">
                                <div class="absolute right-3 top-5 w-8 h-[4px] bg-orange-300 animate-speed-line-1 rounded-full"></div>
                                <div class="absolute right-2 top-10 w-10 h-[4px] bg-orange-400 animate-speed-line-2 rounded-full"></div>
                                <div class="absolute right-4 bottom-5 w-6 h-[4px] bg-orange-300 animate-speed-line-3 rounded-full"></div>
                                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-drive relative z-10 text-orange-600 mt-1"><path d="m11.5 12-4-8h-3"/><path d="M17.5 16h-11"/><circle cx="18.5" cy="16.5" r="3.5"/><circle cx="5.5" cy="16.5" r="3.5"/><path d="M15 12.5V8a1 1 0 0 0-1-1h-3.5a1 1 0 0 0-1 1v4.5"/><path d="m18.5 13-1-4h-4"/></svg>
                            </div>
                            <h4 class="text-white font-black text-2xl sm:text-3xl uppercase italic tracking-wide text-center sm:text-left">
                                ¡Te lo llevamos<br class="hidden xl:block"/> hasta tu casa!
                            </h4>
                        </div>

                        <div class="flex flex-col gap-3 items-center bg-black/30 w-full md:w-auto p-5 sm:p-6 rounded-3xl backdrop-blur-sm relative z-10 border border-white/10 shrink-0">
                            <div class="flex items-center gap-2 mb-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-400 animate-pulse"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                <span class="text-white font-bold tracking-widest text-xs uppercase">Líneas de Atención</span>
                            </div>
                            <div class="flex flex-col sm:flex-row md:flex-col lg:flex-row gap-3 w-full">
                                <button onclick="enviarPedidoGeneral()" class="text-white font-black text-xl sm:text-2xl hover:text-green-400 transition-colors w-full px-6 bg-white/10 py-2 rounded-xl border border-white/5 whitespace-nowrap">
                                    ${formatearTelefono(appData.phones[0])}
                                </button>
                                ${appData.phones[1] ? `
                                <button onclick="enviarPedidoGeneral()" class="text-white font-black text-xl sm:text-2xl hover:text-green-400 transition-colors w-full px-6 bg-white/10 py-2 rounded-xl border border-white/5 whitespace-nowrap">
                                    ${formatearTelefono(appData.phones[1])}
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>

                    <!-- Dirección -->
                    <div class="bg-yellow-400 p-6 flex flex-row items-center justify-center gap-4 text-black text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-bounce text-orange-600 shrink-0"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                        <p class="font-extrabold text-lg sm:text-xl uppercase tracking-tight">${appData.address}</p>
                    </div>
                </div>
            `;
        }

        // --- LÓGICA DE WHATSAPP ---
        function formatearTelefono(tel) {
            // Intenta separar si tiene código de país, formato estético
            let t = tel.toString();
            if(t.startsWith('505')) t = t.substring(3);
            if(t.length === 8) return `${t.substring(0,4)} ${t.substring(4)}`;
            return tel; // fallback
        }

        function abrirWhatsApp(mensaje) {
            const numeros = appData.phones.filter(n => n.trim() !== "");
            if(numeros.length === 0) { alert("No hay números configurados."); return; }
            const numeroSeleccionado = numeros[Math.floor(Math.random() * numeros.length)];
            const urlWhatsApp = `https://wa.me/${numeroSeleccionado}?text=${encodeURIComponent(mensaje)}`;
            window.open(urlWhatsApp, '_blank');
        }

        function enviarPedidoGeneral() {
            abrirWhatsApp(appData.waMessage);
        }

        function enviarPedidoProducto(nombreProducto, precio) {
            abrirWhatsApp(`¡Hola El Patio! Me interesa pedir el *${nombreProducto}* por C$ ${precio}. ¿Me pueden tomar el pedido? 🛵🍗`);
        }


        // --- LÓGICA DE ADMINISTRACIÓN ---
        function verificarAdmin() {
            const password = prompt("🔐 Acceso Restringido. Ingrese el PIN de administrador:");
            if (password === "1234") { // Contraseña por defecto
                abrirPanelAdmin();
            } else if (password !== null) {
                alert("PIN incorrecto.");
            }
        }

        function abrirPanelAdmin() {
            // Copia profunda para no afectar los datos hasta que se le de a "Guardar"
            adminTempProducts = JSON.parse(JSON.stringify(appData.products));
            
            // Llenar campos generales
            document.getElementById('edit-phone-1').value = appData.phones[0] || "";
            document.getElementById('edit-phone-2').value = appData.phones[1] || "";
            document.getElementById('edit-address').value = appData.address || "";
            document.getElementById('edit-wa-msg').value = appData.waMessage || "";
            
            renderizarListaAdmin();
            
            document.getElementById('admin-modal').classList.remove('hidden');
        }

        function cerrarAdmin() {
            document.getElementById('admin-modal').classList.add('hidden');
        }

        // Renderiza las tarjetas de productos dentro del Modal
        function renderizarListaAdmin() {
            const list = document.getElementById('admin-products-list');
            list.innerHTML = adminTempProducts.map((p, index) => `
                <div class="bg-stone-800 p-4 rounded-xl border border-stone-700 relative">
                    <div class="absolute top-2 right-2">
                        <button onclick="eliminarProductoAdmin(${index})" class="text-red-500 hover:bg-red-500/20 p-2 rounded-lg transition-colors" title="Eliminar Producto">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                        <div class="md:col-span-3">
                            <label class="block text-stone-400 text-xs font-bold mb-1">Imagen (URL http...)</label>
                            <input type="text" onchange="actualizarTempProp(${index}, 'img', this.value)" value="${p.img}" class="w-full bg-stone-900 text-white text-sm border border-stone-700 rounded-lg p-2 focus:outline-none focus:border-orange-500">
                            <img src="${p.img}" class="mt-2 w-full h-24 object-cover rounded-lg border border-stone-700 bg-stone-950" onerror="this.src='https://placehold.co/400x300/292524/ea580c?text=Img+Error'">
                        </div>
                        <div class="md:col-span-9 space-y-3">
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                                <div class="md:col-span-3">
                                    <label class="block text-stone-400 text-xs font-bold mb-1">Nombre del Producto</label>
                                    <input type="text" onchange="actualizarTempProp(${index}, 'name', this.value)" value="${p.name}" class="w-full bg-stone-900 text-white border border-stone-700 rounded-lg p-2 focus:outline-none focus:border-orange-500">
                                </div>
                                <div class="md:col-span-1">
                                    <label class="block text-stone-400 text-xs font-bold mb-1">Precio (C$)</label>
                                    <input type="text" onchange="actualizarTempProp(${index}, 'price', this.value)" value="${p.price}" class="w-full bg-stone-900 text-white border border-stone-700 rounded-lg p-2 focus:outline-none focus:border-orange-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-stone-400 text-xs font-bold mb-1">Descripción</label>
                                <textarea onchange="actualizarTempProp(${index}, 'desc', this.value)" class="w-full bg-stone-900 text-white text-sm border border-stone-700 rounded-lg p-2 h-16 resize-none focus:outline-none focus:border-orange-500">${p.desc}</textarea>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="pop-${index}" onchange="actualizarTempProp(${index}, 'popular', this.checked)" ${p.popular ? 'checked' : ''} class="w-4 h-4 text-orange-500 bg-stone-900 border-stone-700 rounded focus:ring-orange-500 focus:ring-2 accent-orange-500">
                                <label for="pop-${index}" class="text-stone-300 text-sm font-bold flex items-center gap-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="text-yellow-400"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                                    Marcar como "MÁS PEDIDO"
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function actualizarTempProp(index, prop, value) {
            adminTempProducts[index][prop] = value;
            if(prop === 'img') renderizarListaAdmin(); // Re-renderizar para actualizar la miniatura
        }

        function agregarProductoVacio() {
            adminTempProducts.push({
                id: Date.now(), // ID único
                name: "NUEVO PRODUCTO",
                desc: "Descripción del producto aquí...",
                price: "0",
                img: "https://placehold.co/800x600/292524/ea580c?text=Foto+Aqui",
                popular: false
            });
            renderizarListaAdmin();
            // Scroll hacia el final
            setTimeout(() => {
                const container = document.getElementById('admin-form-container');
                container.scrollTop = container.scrollHeight;
            }, 50);
        }

        function eliminarProductoAdmin(index) {
            if(confirm("¿Seguro que deseas eliminar este producto?")) {
                adminTempProducts.splice(index, 1);
                renderizarListaAdmin();
            }
        }

        // GUARDAR CAMBIOS FINALES
        function guardarCambios() {
            // Actualizar datos generales
            appData.phones = [
                document.getElementById('edit-phone-1').value.trim(),
                document.getElementById('edit-phone-2').value.trim()
            ];
            appData.address = document.getElementById('edit-address').value;
            appData.waMessage = document.getElementById('edit-wa-msg').value;
            
            // Actualizar productos
            appData.products = adminTempProducts;

            // Guardar en el navegador
            localStorage.setItem('elPatioData', JSON.stringify(appData));
            
            // Aplicar cambios a la vista
            renderizarMenu();
            cerrarAdmin();
            
            // Opcional: Feedback visual de guardado (podría ser un toast, pero usaremos alert para simplificar)
            // alert("¡Cambios guardados con éxito!");
        }

        // --- INICIALIZACIÓN ---
        // Renderizar la primera vez que carga la página
        window.onload = () => {
            renderizarMenu();
        };

    </script>
</body>
</html>
